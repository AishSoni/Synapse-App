<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse - Your Second Brain</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- D3.js for Mind Map -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        button, input, .interactive {
            -webkit-app-region: no-drag;
        }

        /* Smooth transitions */
        .transition-smooth {
            transition: all 0.15s ease-out;
        }

        /* Mind map canvas */
        #mind-map-canvas {
            cursor: grab;
        }

        #mind-map-canvas:active {
            cursor: grabbing;
        }

        /* Node styles */
        .node {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .node:hover {
            filter: brightness(1.2);
        }

        .node.selected {
            stroke: #6366f1;
            stroke-width: 3px;
        }

        /* Link styles */
        .link {
            stroke: #6366f1;
            stroke-opacity: 0.3;
            stroke-width: 1.5px;
            fill: none;
        }

        .link.strong {
            stroke-opacity: 0.6;
            stroke-width: 2.5px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1f2937;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Chat window animation */
        .chat-expanded {
            animation: expandChat 0.2s ease-out;
        }

        @keyframes expandChat {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <!-- Title Bar (Custom) -->
    <div class="h-10 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4" style="-webkit-app-region: drag;">
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            <span class="text-sm font-semibold">Synapse</span>
        </div>
        <div class="text-xs text-gray-400">Your Second Brain</div>
    </div>

    <!-- Main Container -->
    <div class="flex h-[calc(100vh-40px)]">

        <!-- Side Panel (20rem) -->
        <div class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col">

            <!-- Navigation -->
            <div class="p-4 space-y-2">
                <button id="nav-mindmap" class="w-full text-left px-4 py-3 rounded-xl bg-indigo-600 text-white font-medium transition-smooth hover:bg-indigo-500">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
                        </svg>
                        <span>Mind Map</span>
                    </div>
                </button>

                <button id="nav-spaces" class="w-full text-left px-4 py-3 rounded-xl bg-gray-700 text-gray-300 font-medium transition-smooth hover:bg-gray-600">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                        <span>Spaces</span>
                    </div>
                </button>
            </div>

            <!-- Spaces List -->
            <div class="flex-1 overflow-y-auto px-4 py-2">
                <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Your Spaces</div>
                <div id="spaces-list" class="space-y-1">
                    <!-- Spaces will be populated here -->
                    <div class="px-3 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 cursor-pointer transition-smooth">
                        <div class="text-sm font-medium">All Captures</div>
                        <div class="text-xs text-gray-400" id="total-captures">0 items</div>
                    </div>
                </div>
            </div>

            <!-- Bottom Actions -->
            <div class="p-4 border-t border-gray-700 space-y-2">
                <button id="create-space-btn" class="w-full px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium transition-smooth">
                    + Create Space
                </button>

                <button id="setup-guide-btn" class="w-full px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium transition-smooth">
                    📚 Setup Guide
                </button>

                <button id="settings-btn" class="w-full px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium transition-smooth">
                    ⚙️ Settings
                </button>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 relative overflow-hidden bg-gray-900">

            <!-- Mind Map Canvas -->
            <svg id="mind-map-canvas" class="w-full h-full"></svg>

            <!-- Node Selection Toolbar (Shows when nodes selected) -->
            <div id="selection-toolbar" class="hidden absolute top-4 right-4 bg-gray-800 rounded-xl p-3 shadow-2xl border border-gray-700">
                <div class="text-sm font-medium mb-2"><span id="selected-count">0</span> nodes selected</div>
                <div class="flex gap-2">
                    <button id="group-nodes-btn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition-smooth">
                        Group into Space
                    </button>
                    <button id="clear-selection-btn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium transition-smooth">
                        Clear
                    </button>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="absolute inset-0 flex items-center justify-center">
                <div class="text-center max-w-md">
                    <svg class="w-24 h-24 mx-auto text-gray-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    <h2 class="text-2xl font-bold mb-2">Your Mind Map is Empty</h2>
                    <p class="text-gray-400 mb-6">Start capturing web pages with the Chrome extension (Alt+B) or use the search below to explore your knowledge base.</p>
                    <button class="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-medium transition-smooth">
                        Install Chrome Extension
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Chat Window (Bottom Center) -->
    <div id="chat-window" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-50">

        <!-- Collapsed State (Search Bar) -->
        <div id="chat-collapsed" class="bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 px-6 py-4">
            <div class="flex items-center gap-3 w-[500px]">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search your memories and sources... (Cmd+K)"
                    class="flex-1 bg-transparent outline-none text-white placeholder-gray-400"
                />
                <kbd class="px-2 py-1 text-xs bg-gray-700 rounded">⌘K</kbd>
            </div>
        </div>

        <!-- Expanded State (Search Results) -->
        <div id="chat-expanded" class="hidden bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 chat-expanded" style="width: 50vw; max-height: 60vh;">
            <div class="p-4 border-b border-gray-700">
                <!-- Mode Toggle -->
                <div class="flex gap-2 mb-3">
                    <button id="mode-search" class="mode-btn flex-1 px-4 py-2 rounded-lg text-sm font-medium transition-smooth bg-indigo-600 text-white">
                        🔍 Search
                    </button>
                    <button id="mode-ask" class="mode-btn flex-1 px-4 py-2 rounded-lg text-sm font-medium transition-smooth bg-gray-700 text-gray-400 hover:bg-gray-600">
                        💬 Ask AI
                    </button>
                </div>

                <!-- Search Input -->
                <div class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input
                        id="search-input-expanded"
                        type="text"
                        placeholder="Search your memories and sources..."
                        class="flex-1 bg-transparent outline-none text-white placeholder-gray-400"
                    />
                    <button id="close-chat-btn" class="text-gray-400 hover:text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="search-results" class="p-4 overflow-y-auto max-h-[50vh]">
                <div class="text-sm text-gray-400 mb-4">Type to search your memories and sources...</div>
            </div>
        </div>
    </div>

    <!-- Modal for Creating Spaces -->
    <div id="create-space-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-2xl p-6 w-96 border border-gray-700">
            <h3 class="text-xl font-bold mb-4">Create New Space</h3>
            <input
                id="space-name-input"
                type="text"
                placeholder="Space name (e.g., 'AI Research')"
                class="w-full px-4 py-3 bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 mb-4"
            />
            <div class="flex gap-3">
                <button id="create-space-confirm" class="flex-1 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-medium transition-smooth">
                    Create
                </button>
                <button id="create-space-cancel" class="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg font-medium transition-smooth">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Node Detail Panel (Slide from Right) -->
    <div id="detail-panel" class="hidden fixed right-0 top-10 bottom-0 w-96 bg-gray-800 border-l border-gray-700 shadow-2xl overflow-y-auto z-40" style="transform: translateX(100%); transition: transform 0.3s ease;">
        <div class="p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold">Capture Details</h3>
                <button id="close-detail-btn" class="text-gray-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div id="detail-content">
                <!-- Content will be populated here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
